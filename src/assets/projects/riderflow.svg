<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0f1e"/>
      <stop offset="100%" stop-color="#0d1525"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#131d35"/>
      <stop offset="100%" stop-color="#0e1628"/>
    </linearGradient>
    <linearGradient id="routeGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)"/>
  
  <!-- Subtle grid -->
  <g opacity="0.04" stroke="#4a9eff" stroke-width="0.5">
    <line x1="0" y1="50" x2="800" y2="50"/>
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="150" x2="800" y2="150"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="250" x2="800" y2="250"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="350" x2="800" y2="350"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="0" y1="450" x2="800" y2="450"/>
    <line x1="80" y1="0" x2="80" y2="500"/>
    <line x1="160" y1="0" x2="160" y2="500"/>
    <line x1="240" y1="0" x2="240" y2="500"/>
    <line x1="320" y1="0" x2="320" y2="500"/>
    <line x1="400" y1="0" x2="400" y2="500"/>
    <line x1="480" y1="0" x2="480" y2="500"/>
    <line x1="560" y1="0" x2="560" y2="500"/>
    <line x1="640" y1="0" x2="640" y2="500"/>
    <line x1="720" y1="0" x2="720" y2="500"/>
  </g>

  <!-- Map background panel -->
  <rect x="40" y="40" width="460" height="340" rx="12" fill="#0c1629" stroke="#1e3a6e" stroke-width="1"/>
  
  <!-- Map road grid -->
  <g stroke="#1a2d50" stroke-width="6" opacity="0.8">
    <line x1="40" y1="160" x2="500" y2="160"/>
    <line x1="40" y1="260" x2="500" y2="260"/>
    <line x1="160" y1="40" x2="160" y2="380"/>
    <line x1="320" y1="40" x2="320" y2="380"/>
    <line x1="440" y1="40" x2="440" y2="380"/>
  </g>
  
  <!-- Active route glow -->
  <path d="M 100 320 Q 160 320 160 260 Q 160 200 220 180 Q 280 160 320 160 Q 380 160 420 120" 
        stroke="#3b82f6" stroke-width="4" fill="none" opacity="0.3" filter="url(#softGlow)"/>
  <path d="M 100 320 Q 160 320 160 260 Q 160 200 220 180 Q 280 160 320 160 Q 380 160 420 120" 
        stroke="#60a5fa" stroke-width="2.5" fill="none" stroke-dasharray="8,4"/>

  <!-- Secondary route -->
  <path d="M 100 320 Q 100 260 160 260 Q 240 260 280 220 Q 340 180 420 120" 
        stroke="#6366f1" stroke-width="2" fill="none" opacity="0.5" stroke-dasharray="5,5"/>

  <!-- Location pins -->
  <!-- Start pin -->
  <circle cx="100" cy="320" r="10" fill="#22c55e" opacity="0.2"/>
  <circle cx="100" cy="320" r="6" fill="#22c55e"/>
  <text x="115" y="315" fill="#86efac" font-size="10" font-weight="600">PICKUP</text>
  
  <!-- End pin -->
  <circle cx="420" cy="120" r="10" fill="#3b82f6" opacity="0.2"/>
  <circle cx="420" cy="120" r="6" fill="#60a5fa"/>
  <text x="432" y="115" fill="#93c5fd" font-size="10" font-weight="600">DROP</text>

  <!-- Rider dot moving on route -->
  <circle cx="260" cy="175" r="8" fill="#f59e0b" opacity="0.3" filter="url(#softGlow)"/>
  <circle cx="260" cy="175" r="5" fill="#fbbf24"/>
  <text x="272" y="170" fill="#fde68a" font-size="9" font-weight="600">RIDER</text>

  <!-- Map label -->
  <rect x="50" y="50" width="90" height="22" rx="5" fill="#1e3a6e" opacity="0.8"/>
  <text x="60" y="65" fill="#93c5fd" font-size="10" font-weight="700">LIVE MAP</text>

  <!-- ETA badge -->
  <rect x="355" y="50" width="130" height="28" rx="6" fill="#0f2447" stroke="#1e3a6e"/>
  <circle cx="370" cy="64" r="5" fill="#22c55e"/>
  <text x="382" y="69" fill="#e2e8f0" font-size="11" font-weight="600">ETA: 4 min</text>

  <!-- Right panel -->
  <rect x="520" y="40" width="240" height="340" rx="12" fill="url(#cardGrad)" stroke="#1e2d4e" stroke-width="1"/>
  
  <!-- Panel header -->
  <text x="540" y="78" fill="#e2e8f0" font-size="14" font-weight="700">Ride Dispatch</text>
  <rect x="540" y="88" width="200" height="1" fill="#1e3a6e"/>

  <!-- Active rides list -->
  <text x="540" y="112" fill="#64748b" font-size="10" font-weight="600" letter-spacing="1">ACTIVE RIDES</text>

  <!-- Ride item 1 -->
  <rect x="540" y="120" width="200" height="48" rx="7" fill="#0d1829" stroke="#1e3358" stroke-width="1"/>
  <circle cx="556" cy="144" r="8" fill="#22c55e" opacity="0.15"/>
  <circle cx="556" cy="144" r="4" fill="#22c55e"/>
  <text x="570" y="139" fill="#e2e8f0" font-size="11" font-weight="600">Rider #A-042</text>
  <text x="570" y="153" fill="#64748b" font-size="9">2.3 km · 4 min</text>
  <rect x="700" y="131" width="34" height="16" rx="4" fill="#052e16"/>
  <text x="706" y="143" fill="#22c55e" font-size="9" font-weight="700">LIVE</text>

  <!-- Ride item 2 -->
  <rect x="540" y="174" width="200" height="48" rx="7" fill="#0d1829" stroke="#1e3358" stroke-width="1"/>
  <circle cx="556" cy="198" r="8" fill="#f59e0b" opacity="0.15"/>
  <circle cx="556" cy="198" r="4" fill="#f59e0b"/>
  <text x="570" y="193" fill="#e2e8f0" font-size="11" font-weight="600">Rider #B-017</text>
  <text x="570" y="207" fill="#64748b" font-size="9">4.1 km · 8 min</text>
  <rect x="695" y="185" width="42" height="16" rx="4" fill="#1c1104"/>
  <text x="700" y="197" fill="#f59e0b" font-size="9" font-weight="700">EN ROUTE</text>

  <!-- Ride item 3 -->
  <rect x="540" y="228" width="200" height="48" rx="7" fill="#0d1829" stroke="#1e3358" stroke-width="1"/>
  <circle cx="556" cy="252" r="8" fill="#6366f1" opacity="0.15"/>
  <circle cx="556" cy="252" r="4" fill="#818cf8"/>
  <text x="570" y="247" fill="#e2e8f0" font-size="11" font-weight="600">Rider #C-089</text>
  <text x="570" y="261" fill="#64748b" font-size="9">0.8 km · 2 min</text>
  <rect x="695" y="239" width="42" height="16" rx="4" fill="#13124b"/>
  <text x="700" y="251" fill="#818cf8" font-size="9" font-weight="700">NEARBY</text>

  <!-- Stats row -->
  <rect x="540" y="284" width="92" height="56" rx="7" fill="#0d1829" stroke="#1e3358"/>
  <text x="556" y="305" fill="#64748b" font-size="9" font-weight="600">ONLINE</text>
  <text x="556" y="327" fill="#22c55e" font-size="22" font-weight="700">24</text>

  <rect x="648" y="284" width="92" height="56" rx="7" fill="#0d1829" stroke="#1e3358"/>
  <text x="664" y="305" fill="#64748b" font-size="9" font-weight="600">REQUESTS</text>
  <text x="664" y="327" fill="#60a5fa" font-size="22" font-weight="700">7</text>

  <!-- Tech badges row -->
  <g>
    <rect x="40" y="395" width="68" height="24" rx="6" fill="#0f2035" stroke="#1e3a6e"/>
    <text x="53" y="411" fill="#93c5fd" font-size="10" font-weight="600">Kafka</text>
    
    <rect x="116" y="395" width="60" height="24" rx="6" fill="#0f2035" stroke="#1e3a6e"/>
    <text x="126" y="411" fill="#93c5fd" font-size="10" font-weight="600">Redis</text>
    
    <rect x="184" y="395" width="80" height="24" rx="6" fill="#0f2035" stroke="#1e3a6e"/>
    <text x="194" y="411" fill="#93c5fd" font-size="10" font-weight="600">Socket.io</text>
    
    <rect x="272" y="395" width="74" height="24" rx="6" fill="#0f2035" stroke="#1e3a6e"/>
    <text x="282" y="411" fill="#93c5fd" font-size="10" font-weight="600">Node.js</text>
    
    <rect x="354" y="395" width="70" height="24" rx="6" fill="#0f2035" stroke="#1e3a6e"/>
    <text x="364" y="411" fill="#93c5fd" font-size="10" font-weight="600">Docker</text>
  </g>

  <!-- Title -->
  <text x="40" y="455" fill="#f1f5f9" font-size="20" font-weight="700">RiderFlow</text>
  <text x="40" y="478" fill="#64748b" font-size="12">Real-time ride dispatch · Geo-based matching · Live tracking</text>
</svg>
