<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <!-- Rich Deep Indigo-to-Violet Gradient -->
    <linearGradient id="premium-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3730a3;stop-opacity:1" /> <!-- Indigo 800 -->
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" /> <!-- Violet 600 -->
    </linearGradient>
    <!-- Soft Inner Shadow / Glow Effect -->
    <filter id="soft-depth" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="0.4" result="blur" />
      <feOffset dx="0" dy="0.6" result="offsetBlur" />
      <feComposite in="SourceGraphic" in2="offsetBlur" operator="over" />
    </filter>
  </defs>
  
  <!-- The "Decent" Squircle Base -->
  <rect x="1" y="1" width="30" height="30" rx="7.5" ry="7.5" fill="url(#premium-bg)" />
  
  <!-- Clear, Professional Bold D -->
  <text x="50%" y="56%" dominant-baseline="middle" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-weight="800" font-size="20" fill="white" style="filter: url(#soft-depth); letter-spacing: -0.05em;">D</text>
</svg>